<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss AI LLM Chat</title>
    <style>
      body {
	font-family: Arial, sans-serif;
	margin: 0;
	padding: 0;
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	background-color: #f4f4f9;
      }

      #appContainer {
	width: 1000px;
	height: 97vh;
	margin: 5px;
	background-color: #fff;
	box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
	border-radius: 12px;
	overflow: hidden;
	display: flex;
	flex-direction: column;
      }

      #header {
	padding: 3px;
	background-color: #007bff;
	color: white;
	text-align: center;
	border-bottom: 2px solid #0056b3;
      }

      .model-selector {
	margin-top: 10px;
	display: flex;
	justify-content: center;
	align-items: center;
      }

      label {
	font-size: 16px;
	margin-right: 10px;
	font-weight: bold;
      }

      .custom-dropdown select {
	padding: 10px;
	border: 1px solid #ccc;
	border-radius: 8px;
	font-size: 16px;
	outline: none;
	cursor: pointer;
      }

      .custom-dropdown select:focus {
	border-color: #007bff;
      }

      .chat-history {
	flex-grow: 1;
	overflow-y: auto;
	padding: 20px;
	background-color: #e9ecef;
	display: flex;
	flex-direction: column;
	gap: 10px;
      }

      .container {
	border-radius: 12px;
	max-width: 70%;
      }

      .user-container {
	background-color: #007bff;
	color: white;
	align-self: flex-end;
      }

      .darker {
	background-color: #e1e1e1;
	color: black;
	align-self: flex-start;
      }

      .input-container {
	display: flex;
	border-top: 1px solid #ccc;
	padding: 10px;
	background-color: #f8f9fa;
      }

      .input-field {
	flex-grow: 1;
	padding: 15px;
	border: 1px solid #ccc;
	border-radius: 8px;
	font-size: 16px;
	outline: none;
      }

      .input-field:focus {
	border-color: #007bff;
      }

      .btn {
	margin-left: 10px;
	background-color: #007bff;
	color: white;
	border: none;
	padding: 15px 25px;
	font-size: 16px;
	border-radius: 8px;
	cursor: pointer;
      }

      .btn:hover {
	background-color: #0056b3;
      }

      .d-none {
	display: none;
      }

      /* Scrollbar styles */
      .chat-history::-webkit-scrollbar {
	width: 10px;
      }

      .chat-history::-webkit-scrollbar-thumb {
	background-color: #ccc;
	border-radius: 8px;
      }

      .chat-history::-webkit-scrollbar-thumb:hover {
	background-color: #aaa;
      }

      #chatOutput > .container > p {
	margin: 10px;
      }

      /* Adjust header for responsive design */
      #header {
	padding: 10px 20px;
	display: flex;
	flex-direction: row;
	justify-content: space-between;
	align-items: center;
	flex-wrap: wrap;
	background-color: #007bff;
	color: white;
	text-align: center;
	border-bottom: 2px solid #0056b3;
      }

      #header h1 {
	margin: 0;
	flex: 1;
	text-align: center;
      }

      .model-selector {
	margin-top: 0;
	flex: 1;
	display: flex;
	justify-content: center;
      }

      .custom-dropdown select {
	width: 100%;
	max-width: 200px;
      }

      /* Adjust message styles for smartphones */
      @media (max-width: 768px) {
	.chat-history .container {
	  max-width: 100%;
	}

	#appContainer {
	  border-radius: 0;
	  height: 100vh;
	  margin: 0;
	}

	#header {
	  flex-direction: column;
	  text-align: center;
	}

	#header h1,
	.model-selector {
	  width: 100%;
	  font-size: x-large;
	}

	.custom-dropdown select {
	  max-width: none;
	}
      }

    </style>
    <script>
      window.onload = function () {
	const sendBtnElem = document.getElementById("sendBtn");
	const chatMessageElem = document.getElementById("chatMessage");
	const chatOutputElem = document.getElementById("chatOutput");
	const modelSelectElem = document.getElementById("modelSelect");

	// Call fetchModels when the page loads
	fetchModels();

	sendBtnElem.addEventListener("click", function () {
	  const message = chatMessageElem.value;
	  const selectedModel = modelSelectElem.value;

	  if (!selectedModel) {
	    alert("Please select a model.");
	    return;
	  }

	  if (message) {
	    generateUserChatBubble(message);
	    sendChatGPTMessage(message, selectedModel, generateAIChatBubble);
	    chatMessageElem.value = "";
	  } else {
	    alert("Please enter a message.");
	  }
	});

	function fetchModels() {
	  const BASE_URL = "https://fmapi.swissai.cscs.ch/models";

	  fetch(BASE_URL, {
	    method: "GET",
	    headers: {
              "Content-Type": "application/json",
	    },
	  })
	    .then(response => {
              if (!response.ok) {
		throw new Error(`Error fetching models: ${response.status} ${response.statusText}`);
              }
              return response.json();
	    })
	    .then(data => {
              if (data.data && data.data.length > 0) {
		const models = data.data.map(model => model.id); // Extract model IDs
		modelSelectElem.innerHTML = models
		  .map(model => `<option value="${model}">${model}</option>`)
		  .join("");
              } else {
		alert("No models available.");
              }
	    })
	    .catch(error => {
              alert("Error fetching models from the API.");
              console.error(error);
	    });
	}

	function generateUserChatBubble(message) {
	  const chatBubbleElem = document.createElement("div");
	  chatBubbleElem.classList.add("container", "user-container");
	  chatBubbleElem.innerHTML = `<p>${message}</p>`;
	  chatOutputElem.appendChild(chatBubbleElem);
	  chatOutputElem.scrollTop = chatOutputElem.scrollHeight;
	}

	function generateAIChatBubble() {
	  const chatBubbleElem = document.createElement("div");
	  chatBubbleElem.classList.add("container", "darker");
	  const messageElem = document.createElement("p");
	  chatBubbleElem.appendChild(messageElem);
	  chatOutputElem.appendChild(chatBubbleElem);
	  chatOutputElem.scrollTop = chatOutputElem.scrollHeight;

	  return messageElem;
	}

	async function sendChatGPTMessage(message, model, onSuccessCallback) {
	  const chatHistory = [{ role: "user", content: message.trim() }];
	  console.log("current call to an API:", message, model);

	  const API_KEY = "{{ api_key }}"; // Replace with your API key
	  const BASE_URL = "https://fmapi.swissai.cscs.ch/chat/completions";

	  const messageBody = {
	    model: model,
	    messages: chatHistory,
	    stream: true, // Enable streaming
	  };

	  const response = await fetch(BASE_URL, {
	    method: "POST",
	    headers: {
              "Authorization": `Bearer ${API_KEY}`,
              "Content-Type": "application/json",
	    },
	    body: JSON.stringify(messageBody),
	  });

	  if (!response.ok) {
	    alert("Error communicating with the API.");
	    console.error(response.statusText);
	    return;
	  }

	  const reader = response.body.getReader();
	  const decoder = new TextDecoder("utf-8");
	  const aiMessageElem = onSuccessCallback();

	  let buffer = "";
	  while (true) {
	    const { value, done } = await reader.read();
	    if (done) break;

	    buffer += decoder.decode(value, { stream: true });
	    const chunks = buffer.split("\n\n");
	    buffer = chunks.pop(); // Keep incomplete chunk in the buffer

	    for (const chunk of chunks) {
              if (chunk.startsWith("data:")) {
		const data = chunk.slice(5).trim(); // Remove "data:" prefix
		if (data === "[DONE]") {
		  return;
		}

		try {
		  const parsed = JSON.parse(data);
		  if (parsed.choices && parsed.choices[0].delta.content) {
		    const partialText = parsed.choices[0].delta.content;
		    aiMessageElem.textContent += partialText; // Append to the AI chat bubble
		    chatOutputElem.scrollTop = chatOutputElem.scrollHeight;
		  }
		} catch (error) {
		  console.error("Error parsing streaming response:", error);
		}
              }
	    }
	  }
	}
      };
    </script>
  </head>
  <body>
    <div id="appContainer">
      <div id="header" class="responsive-header">
        <h1>Swiss AI LLM Chat</h1>
        <div class="model-selector">
          <div class="custom-dropdown">
            <select id="modelSelect">
              <option value="">Loading models...</option>
            </select>
          </div>
        </div>
      </div>
      <div id="chatOutput" class="chat-history">
        <!-- Chat messages will appear here -->
      </div>
      <form id="chatForm" action="javascript:void(0)">
        <div class="input-container">
          <input id="chatMessage" class="input-field" type="text" placeholder="Enter message..." name="usrnm">
          <button type="submit" id="sendBtn" class="btn">Send</button>
        </div>
      </form>
    </div>
  </body>
</html>
